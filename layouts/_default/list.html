{{ define "main" }}
<section class="post-list">
  <h2>{{ .Title }}</h2>
  {{ if .Pages }}
  <ul>
    {{ range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2006" }}</time>
    </li>
    {{ end }}
  </ul>
  {{ else }}
  <p class="empty">Nothing here yet.</p>
  {{ end }}
</section>
{{ end }}
