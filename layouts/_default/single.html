{{ define "main" }}
<article class="post">
  {{ with .Params.image }}
  <img class="post-cover" src="{{ . }}" alt="" loading="lazy">
  {{ end }}
  <h1 class="post-title">{{ .Title }}</h1>
  {{ if eq .Section "posts" }}
  <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
  {{ end }}
  <div class="post-body">
    {{ .Content }}
  </div>
</article>
<p class="back"><a href="/">&larr; Back</a></p>
{{ end }}
