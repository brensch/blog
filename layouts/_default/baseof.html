<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} &middot; {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='78' font-size='80' text-anchor='middle'>&#10038;</text></svg>">
  <link rel="preload" href="/fonts/newsreader-roman.woff2" as="font" type="font/woff2" crossorigin>
  {{ with resources.Get "css/style.css" | minify }}
  <style>{{ .Content | safeCSS }}</style>
  {{ end }}
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="/">{{ .Site.Title }}</a>
    <nav class="site-nav">
      <a href="/">Writing</a>
      <a href="/about/">About</a>
    </nav>
  </header>
  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>&copy; {{ now.Format "2006" }} {{ .Site.Params.author }}</p>
  </footer>
</body>
</html>
